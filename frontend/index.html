    <!-- Schema.org JSON-LD for Technical Depth -->

    <style>
      /* Neural Boot-Loader Flash Prevention */
      body { background: #020617; margin: 0; overflow-x: hidden; }
      #root { opacity: 0; transition: opacity 0.8s ease-in-out; }
      #root.system-ready { opacity: 1; }
      #system-boot {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; z-index: 9999; background: #020617;
        font-family: 'Inter', system-ui, sans-serif;
      }
      .boot-text {
        color: #00f2ff; font-family: monospace; font-size: 10px;
        letter-spacing: 2px; text-transform: uppercase; margin-top: 20px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="system-boot">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18" fill="none" stroke="#00f2ff" stroke-width="2" stroke-dasharray="10 20" class="animate-spin-slow">
          <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="3s" repeatCount="indefinite" />
        </circle>
      </svg>
      <div class="boot-text">Initializing Neural Link...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // System Handshake
      window.addEventListener('load', () => {
        setTimeout(() => {
          const boot = document.getElementById('system-boot');
          const root = document.getElementById('root');
          if (boot) boot.style.display = 'none';
          if (root) root.classList.add('system-ready');
        }, 800);
      });
    </script>
  </body>
</html>
